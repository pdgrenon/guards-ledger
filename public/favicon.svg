<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: light) {
      .bg     { fill: #f5edd8; }
      .shield { fill: #f5edd8; stroke: #8a6f3e; }
      .letter { fill: #8a6f3e; }
    }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #2e2010; }
      .shield { fill: #2e2010; stroke: #c4963c; }
      .letter { fill: #c4963c; }
    }
  </style>
  <rect width="32" height="32" rx="6" class="bg"/>
  <!-- Shield: flat top, straight sides tapering inward, curves to a point at bottom -->
  <path d="M5 4 L27 4 L27 18 Q27 24 16 30 Q5 24 5 18 Z"
    class="shield" stroke-width="1.75"/>
  <text x="16" y="21" text-anchor="middle"
    font-family="Cinzel, Georgia, 'Times New Roman', serif"
    font-size="16" font-weight="600"
    class="letter">L</text>
</svg>
